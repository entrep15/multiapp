<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US States</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 28px;
    width: 100%;
    max-width: 1040px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    text-align: center;
    position: relative;
  }
  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .back-link {
    color: #764ba2;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    background: #f1edf6;
    padding: 8px 14px;
    border-radius: 999px;
  }
  .back-link:hover { background: #e4dcf0; }
  h1 {
    margin: 0;
    font-size: 26px;
    color: #4a3568;
  }
  .progress-pill {
    background: #f1edf6;
    color: #6a4f8c;
    font-weight: 800;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
    min-width: 92px;
  }
  .mode-toggle {
    display: flex;
    gap: 6px;
    background: #f1edf6;
    padding: 4px;
    border-radius: 999px;
    margin: 0 auto 14px;
    max-width: 360px;
  }
  .mode-btn {
    flex: 1;
    background: transparent;
    color: #6a4f8c;
    border: none;
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .mode-btn.active {
    background: #764ba2;
    color: #fff;
    box-shadow: 0 2px 6px rgba(118, 75, 162, 0.3);
  }
  .map-wrap { position: relative; }
  #usmap { width: 100%; height: auto; display: block; }

  /* State shapes */
  #usmap g.state path {
    fill: #ffffff;
    stroke: #9a8fb0;
    stroke-width: 1;
    transition: fill 0.15s;
  }
  #usmap g.borders path { stroke: #9a8fb0; stroke-width: 1; fill: none; pointer-events: none; }
  #usmap .separator1, #usmap .separator2 { stroke: #c9c2d8; fill: none; }
  #usmap .dccircle { display: none; }
  #usmap g.state path.dc { pointer-events: none; }

  body.test-mode #usmap g.state path.quiz { cursor: pointer; }
  body.test-mode #usmap g.state path.quiz:hover { fill: #c4efc4; }
  body.learn-mode #usmap g.state path { cursor: default; }
  body.learn-mode #usmap g.state path:hover { fill: #c4efc4; }
  #usmap g.state path.answered {
    fill: #d5d5d5 !important;
    cursor: default !important;
  }
  #usmap g.state path.active-quiz { fill: #ffd76e !important; }

  .state-label {
    font-weight: 700;
    fill: #3a2d52;
    pointer-events: none;
    dominant-baseline: middle;
    text-anchor: middle;
  }
  .state-label.answered-label { fill: #555; }
  /* Hovered state's label pops: bigger, green, with a white halo so it stays
     readable — especially the offshore labels of small east-coast states. */
  .state-label.hot {
    font-size: 16px;
    font-weight: 800;
    fill: #1d6b2f;
    stroke: #ffffff;
    stroke-width: 3.5px;
    paint-order: stroke;
  }
  .leader-line { stroke: #b5a8cc; stroke-width: 1; pointer-events: none; }
  .leader-line.hot { stroke: #2e8b57; stroke-width: 2.5; }

  .feedback-line {
    min-height: 34px;
    font-size: 19px;
    font-weight: 800;
    color: #2e8b57;
    margin-top: 10px;
  }
  .feedback-line.oops { color: #c0392b; }

  /* Quiz popup */
  .quiz-pop {
    position: fixed;
    z-index: 50;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 12px 36px rgba(0,0,0,0.35);
    padding: 14px 16px;
    width: 230px;
    display: none;
  }
  .quiz-pop.open { display: block; }
  .quiz-pop .q-title { font-weight: 800; color: #4a3568; margin-bottom: 10px; font-size: 15px; }
  .quiz-pop button {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border: 2px solid #e4dcf0;
    background: #faf8fd;
    color: #4a3568;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .quiz-pop button:hover { background: #f1edf6; }
  .quiz-pop button.wrong {
    background: #fdeaea;
    border-color: #f3b8b8;
    color: #b06060;
    text-decoration: line-through;
    cursor: not-allowed;
    animation: shake 0.3s;
  }
  .quiz-pop .q-feedback { font-size: 13px; font-weight: 700; color: #c0392b; min-height: 16px; margin-top: 4px; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .confetti-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 90; }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 14px;
    top: -20px;
    animation-name: fall;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); }
  }

  /* Login overlay (same pattern as the math app) */
  .login-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .login-overlay.hidden { display: none; }
  .login-card {
    background: #fff; border-radius: 16px; padding: 36px 44px;
    text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    max-width: 360px; width: 90%;
  }
  .login-card h2 { color: #4a3568; margin: 0 0 6px; }
  .login-card p { color: #888; margin: 0 0 18px; font-size: 14px; }
  .login-card input {
    width: 100%; font-size: 28px; text-align: center; letter-spacing: 8px;
    padding: 10px; border: 2px solid #e4dcf0; border-radius: 10px; margin-bottom: 12px;
  }
  .login-card button {
    width: 100%; background: #764ba2; color: #fff; border: none;
    padding: 12px; font-size: 17px; font-weight: 700; border-radius: 10px; cursor: pointer;
  }
  .login-error { color: #c0392b; font-size: 13px; font-weight: 700; min-height: 18px; margin-top: 8px; }

  @media (max-width: 700px) {
    .card { padding: 14px; }
    h1 { font-size: 20px; }
  }
</style>
</head>

<script>
(function () {
  const STATE_NAMES = {
    al: 'Alabama', ak: 'Alaska', az: 'Arizona', ar: 'Arkansas', ca: 'California',
    co: 'Colorado', ct: 'Connecticut', de: 'Delaware', fl: 'Florida', ga: 'Georgia',
    hi: 'Hawaii', id: 'Idaho', il: 'Illinois', in: 'Indiana', ia: 'Iowa',
    ks: 'Kansas', ky: 'Kentucky', la: 'Louisiana', me: 'Maine', md: 'Maryland',
    ma: 'Massachusetts', mi: 'Michigan', mn: 'Minnesota', ms: 'Mississippi', mo: 'Missouri',
    mt: 'Montana', ne: 'Nebraska', nv: 'Nevada', nh: 'New Hampshire', nj: 'New Jersey',
    nm: 'New Mexico', ny: 'New York', nc: 'North Carolina', nd: 'North Dakota', oh: 'Ohio',
    ok: 'Oklahoma', or: 'Oregon', pa: 'Pennsylvania', ri: 'Rhode Island', sc: 'South Carolina',
    sd: 'South Dakota', tn: 'Tennessee', tx: 'Texas', ut: 'Utah', vt: 'Vermont',
    va: 'Virginia', wa: 'Washington', wv: 'West Virginia', wi: 'Wisconsin', wy: 'Wyoming'
  };
  const CODES = Object.keys(STATE_NAMES);

  // Small east-coast states: labels go in an offshore column with leader lines.
  const OFFSHORE = {
    nh: { x: 905, y: 130 },
    vt: { x: 905, y: 105 },
    ma: { x: 905, y: 168 },
    ri: { x: 905, y: 196 },
    ct: { x: 905, y: 224 },
    nj: { x: 905, y: 258 },
    de: { x: 905, y: 288 },
    md: { x: 905, y: 316 }
  };
  // Nudges for states whose bounding-box center misses the shape.
  const NUDGE = {
    mi: { dx: 16, dy: 30 }, la: { dx: -10, dy: 0 }, fl: { dx: 18, dy: 0 },
    id: { dx: 0, dy: 18 }, mn: { dx: -8, dy: 6 }, va: { dx: 6, dy: 6 }, ny: { dx: -4, dy: 8 }
  };

  const PRAISE = [
    '🎉 YES! That\'s {name}!',
    '🌟 AWESOME! {name} it is!',
    '🚀 BOOM! You nailed {name}!',
    '🏆 Superstar! That\'s {name}!',
    '⭐ WOW! {name} — you got it!',
    '🥳 High five! That\'s {name}!'
  ];
  const FIRST_TRY = '🌟 FIRST TRY! ';

  const STORAGE_KEY = 'us_states_v1';
  const feedbackEl = document.getElementById('feedback');
  const doneCountEl = document.getElementById('done-count');
  const popEl = document.getElementById('quiz-pop');
  const qOptionsEl = document.getElementById('q-options');
  const qFeedbackEl = document.getElementById('q-feedback');
  const svg = document.querySelector('#map-wrap svg');
  svg.id = 'usmap';

  let mode = 'learn';
  let userPin = '';
  let answered = {};       // { code: true }
  let hoverTimer = null;
  let quizCode = null;     // state currently in the popup
  let wrongThisPopup = 0;

  // ----- PT-day persistence (marker travels WITH the data) -----
  function getPTDate() {
    return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toDateString();
  }
  function loadProgress() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (p && p.day === getPTDate() && p.answered && typeof p.answered === 'object') {
          answered = {};
          for (const k in p.answered) if (STATE_NAMES[k]) answered[k] = true;
          return;
        }
      }
    } catch (e) {}
    answered = {};
  }
  function saveProgress() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ day: getPTDate(), answered: answered }));
    } catch (e) {}
  }
  // Midnight PT rollover — clears the board within a minute even mid-session.
  setInterval(function () {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const p = raw ? JSON.parse(raw) : null;
      if (p && p.day !== getPTDate()) {
        answered = {};
        saveProgress();
        renderAll();
        setFeedback('🌅 A new day — the map is fresh! Can you name all 50 again?', false);
      }
    } catch (e) {}
  }, 60000);

  // ----- Server events (fire-and-forget; never writes game state) -----
  function postEvent(event) {
    if (!userPin) return;
    try {
      fetch('/api/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: userPin, event: event })
      }).catch(function () {});
    } catch (e) {}
  }

  // ----- Map wiring -----
  const statePaths = {};
  svg.querySelectorAll('g.state path').forEach(function (p) {
    const code = (p.getAttribute('class') || '').trim();
    if (STATE_NAMES[code]) {
      statePaths[code] = p;
      p.classList.add('quiz');
      p.setAttribute('data-code', code);
    }
  });

  const labelLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(labelLayer);
  let labelEls = {};   // { code: { t: <text>, line: <line>|null } }

  function labelPoint(code) {
    const b = statePaths[code].getBBox();
    let x = b.x + b.width / 2, y = b.y + b.height / 2;
    const n = NUDGE[code];
    if (n) { x += n.dx; y += n.dy; }
    return { x: x, y: y, bbox: b };
  }

  function fontSizeFor(code) {
    const b = statePaths[code].getBBox();
    const len = STATE_NAMES[code].length;
    const size = Math.min(13, Math.max(7.5, (b.width * 0.9) / (len * 0.62)));
    return size;
  }

  function drawLabel(code, cls) {
    const name = STATE_NAMES[code];
    const off = OFFSHORE[code];
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('class', 'state-label ' + (cls || ''));
    let line = null;
    if (off) {
      const p = labelPoint(code);
      line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', 'leader-line');
      line.setAttribute('x1', p.x); line.setAttribute('y1', p.y);
      line.setAttribute('x2', off.x - 4); line.setAttribute('y2', off.y);
      labelLayer.appendChild(line);
      t.setAttribute('x', off.x); t.setAttribute('y', off.y);
      t.setAttribute('text-anchor', 'start');
      t.setAttribute('font-size', 12);
    } else {
      const p = labelPoint(code);
      t.setAttribute('x', p.x); t.setAttribute('y', p.y);
      t.setAttribute('font-size', fontSizeFor(code));
    }
    t.textContent = name;
    labelLayer.appendChild(t);
    labelEls[code] = { t: t, line: line };
  }

  // Hover emphasis: pop the state's label (and leader line) so small states
  // with offshore labels are easy to match to their shape.
  function highlightLabel(code, on) {
    const L = labelEls[code];
    if (!L) return;
    L.t.classList.toggle('hot', on);
    if (L.line) L.line.classList.toggle('hot', on);
    if (on) labelLayer.appendChild(L.t); // bring to front of other labels
  }

  function renderAll() {
    while (labelLayer.firstChild) labelLayer.removeChild(labelLayer.firstChild);
    labelEls = {};
    let count = 0;
    for (const code of CODES) {
      const p = statePaths[code];
      if (!p) continue;
      const isDone = !!answered[code];
      p.classList.toggle('answered', isDone);
      if (isDone) count++;
      if (mode === 'learn') {
        drawLabel(code, isDone ? 'answered-label' : '');
      } else if (isDone) {
        drawLabel(code, 'answered-label');
      }
    }
    doneCountEl.textContent = count;
    return count;
  }

  function setFeedback(msg, oops) {
    feedbackEl.textContent = msg;
    feedbackEl.className = 'feedback-line' + (oops ? ' oops' : '');
  }

  // ----- Fun bits -----
  let audioCtx = null;
  function chime(good) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const notes = good ? [523.25, 659.25, 783.99] : [220, 174.61];
      notes.forEach(function (f, i) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.09);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.09 + 0.25);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(audioCtx.currentTime + i * 0.09);
        o.stop(audioCtx.currentTime + i * 0.09 + 0.3);
      });
    } catch (e) {}
  }
  function confetti(n) {
    const layer = document.getElementById('confetti-layer');
    const colors = ['#f6ad0f', '#764ba2', '#2e8b57', '#e74c3c', '#3498db', '#ff7ab8'];
    for (let i = 0; i < n; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = (Math.random() * 100) + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      const dur = 1.6 + Math.random() * 1.6;
      piece.style.animationDuration = dur + 's';
      piece.style.animationDelay = (Math.random() * 0.4) + 's';
      layer.appendChild(piece);
      setTimeout(function () { piece.remove(); }, dur * 1000 + 600);
    }
  }
  function speak(msg) {
    try {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(msg);
      u.lang = 'en-US'; u.rate = 0.95; u.pitch = 1.1;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  // ----- Quiz popup -----
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function openQuiz(code, cx, cy) {
    if (mode !== 'test' || answered[code]) return;
    closeQuiz();
    quizCode = code;
    wrongThisPopup = 0;
    statePaths[code].classList.add('active-quiz');

    const decoys = shuffle(CODES.filter(function (c) { return c !== code; })).slice(0, 2);
    const options = shuffle([code].concat(decoys));
    qOptionsEl.innerHTML = '';
    qFeedbackEl.textContent = '';
    options.forEach(function (c) {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = STATE_NAMES[c];
      b.addEventListener('click', function () { answer(c, b); });
      qOptionsEl.appendChild(b);
    });

    popEl.classList.add('open');
    positionPopup(code);
  }

  // Place the popup beside the state WITHOUT covering it: try right, left,
  // below, then above of the state's bounding box; take the first position
  // that fits on screen and doesn't overlap the shape being asked about.
  function positionPopup(code) {
    const sr = statePaths[code].getBoundingClientRect();
    const pw = popEl.offsetWidth || 230, ph = popEl.offsetHeight || 190;
    const m = 12;
    const W = window.innerWidth, H = window.innerHeight;
    const scx = sr.left + sr.width / 2, scy = sr.top + sr.height / 2;
    const clamp = function (v, lo, hi) { return Math.max(lo, Math.min(v, hi)); };
    const candidates = [
      { x: sr.right + m,     y: scy - ph / 2 },   // right of the state
      { x: sr.left - m - pw, y: scy - ph / 2 },   // left
      { x: scx - pw / 2,     y: sr.bottom + m },  // below
      { x: scx - pw / 2,     y: sr.top - m - ph } // above
    ];
    const overlapsState = function (x, y) {
      return x < sr.right + 4 && x + pw > sr.left - 4 &&
             y < sr.bottom + 4 && y + ph > sr.top - 4;
    };
    let best = null;
    for (let i = 0; i < candidates.length; i++) {
      const x = clamp(candidates[i].x, 8, W - pw - 8);
      const y = clamp(candidates[i].y, 8, H - ph - 8);
      if (!overlapsState(x, y)) { best = { x: x, y: y }; break; }
      if (!best) best = { x: x, y: y }; // fallback if every side overlaps
    }
    popEl.style.left = best.x + 'px';
    popEl.style.top = best.y + 'px';
  }

  function closeQuiz() {
    if (quizCode && statePaths[quizCode]) statePaths[quizCode].classList.remove('active-quiz');
    quizCode = null;
    popEl.classList.remove('open');
  }

  function answer(pick, btn) {
    if (!quizCode) return;
    const code = quizCode;
    if (pick === code) {
      const firstTry = wrongThisPopup === 0;
      answered[code] = true;
      saveProgress();
      closeQuiz();
      const msg = (firstTry ? FIRST_TRY : '') +
        PRAISE[Math.floor(Math.random() * PRAISE.length)].replace('{name}', STATE_NAMES[code]);
      setFeedback(msg, false);
      chime(true);
      confetti(firstTry ? 26 : 14);
      speak((firstTry ? 'First try! ' : '') + 'That\'s ' + STATE_NAMES[code] + '!');
      postEvent({ type: 'states-correct', state: code, firstTry: firstTry });
      const count = renderAll();
      if (count >= 50) allDone();
    } else {
      wrongThisPopup++;
      btn.classList.add('wrong');
      btn.disabled = true;
      qFeedbackEl.textContent = '❌ Not quite — try again!';
      setFeedback('💪 Keep going, you can get it!', true);
      chime(false);
      postEvent({ type: 'states-wrong', state: code, picked: pick });
    }
  }

  function allDone() {
    setFeedback('🏆 INCREDIBLE! You named ALL 50 STATES! You\'re a geography champion! 🇺🇸', false);
    confetti(120);
    speak('Incredible! You named all fifty states! You are a geography champion!');
    postEvent({ type: 'states-all-complete' });
    setTimeout(function () {
      answered = {};
      saveProgress();
      renderAll();
      setFeedback('🔄 Fresh map! Can you do all 50 again?', false);
    }, 9000);
  }

  // Hover-with-intent + tap support
  for (const code of CODES) {
    const p = statePaths[code];
    if (!p) continue;
    p.addEventListener('mouseenter', function (e) {
      highlightLabel(code, true);
      if (mode !== 'test' || answered[code]) return;
      clearTimeout(hoverTimer);
      hoverTimer = setTimeout(function () { openQuiz(code, e.clientX, e.clientY); }, 280);
    });
    p.addEventListener('mouseleave', function () {
      highlightLabel(code, false);
      clearTimeout(hoverTimer);
    });
    p.addEventListener('click', function (e) {
      if (mode !== 'test') {
        setFeedback('👆 That\'s ' + STATE_NAMES[code] + '!', false);
        return;
      }
      if (answered[code]) {
        setFeedback('✅ You already got ' + STATE_NAMES[code] + '!', false);
        return;
      }
      clearTimeout(hoverTimer);
      openQuiz(code, e.clientX, e.clientY);
    });
  }
  document.addEventListener('click', function (e) {
    if (!popEl.classList.contains('open')) return;
    if (popEl.contains(e.target)) return;
    if (e.target.closest && e.target.closest('#usmap')) return;
    closeQuiz();
  });

  // ----- Mode toggle -----
  document.querySelectorAll('.mode-btn').forEach(function (b) {
    b.addEventListener('click', function () {
      mode = b.getAttribute('data-mode');
      document.querySelectorAll('.mode-btn').forEach(function (x) {
        x.classList.toggle('active', x === b);
      });
      document.body.className = mode + '-mode';
      closeQuiz();
      setFeedback(mode === 'learn'
        ? '📖 Learn the states — hover around the map!'
        : '🎯 Hover a white state and pick its name!', false);
      renderAll();
    });
  });

  // ----- Login (same PIN as the math app; session-only) -----
  async function tryLogin(pin) {
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!pin) { errEl.textContent = 'Type your code first.'; return; }
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: pin })
      });
      if (res.ok) {
        userPin = pin;
        document.getElementById('login-overlay').classList.add('hidden');
        postEvent({ type: 'states-session-start' });
        setFeedback('📖 Learn the states — hover around the map!', false);
      } else if (res.status === 401) {
        errEl.textContent = 'Oops! Wrong code. Try again.';
        document.getElementById('login-pin').value = '';
      } else {
        errEl.textContent = 'Server error. Try again.';
      }
    } catch (e) {
      errEl.textContent = 'Could not connect. Try again later.';
    }
  }
  document.getElementById('login-btn').addEventListener('click', function () {
    tryLogin(document.getElementById('login-pin').value.trim());
  });
  document.getElementById('login-pin').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); tryLogin(document.getElementById('login-pin').value.trim()); }
  });

  // ----- Boot -----
  loadProgress();
  renderAll();
})();
</script>
</body>
</html>
