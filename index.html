<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiplication Practice</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    text-align: center;
  }
  .op-toggle {
    display: flex;
    gap: 6px;
    background: #f1edf6;
    padding: 4px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
  .op-btn {
    flex: 1;
    background: transparent;
    color: #6a4f8c;
    border: none;
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.1s;
    margin: 0;
    display: block;
  }
  .op-btn:hover { background: rgba(118, 75, 162, 0.08); }
  .op-btn.active {
    background: #764ba2;
    color: #fff;
    box-shadow: 0 2px 6px rgba(118, 75, 162, 0.3);
  }
  .picker-group {
    display: flex;
    gap: 4px;
    background: #f1edf6;
    padding: 4px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .picker-btn {
    flex: 1;
    background: transparent;
    color: #6a4f8c;
    border: none;
    padding: 8px 4px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.1s;
    margin: 0;
    display: block;
    white-space: nowrap;
  }
  .picker-btn:hover { background: rgba(118, 75, 162, 0.08); }
  .picker-btn:active { transform: scale(0.96); }
  .picker-btn.active {
    background: #764ba2;
    color: #fff;
    box-shadow: 0 2px 6px rgba(118, 75, 162, 0.3);
  }
  .picker-btn.dog.active {
    background: linear-gradient(90deg, #ff9a3d, #ff4d4d);
    box-shadow: 0 2px 6px rgba(230, 74, 25, 0.4);
  }
  .picker-btn.cheetah.active {
    background: linear-gradient(90deg, #ff4d4d, #b71c1c);
    box-shadow: 0 2px 8px rgba(183, 28, 28, 0.5);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid #eee;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    color: #555;
  }
  .points {
    font-size: 18px;
    font-weight: 700;
    color: #764ba2;
    background: #f3f0fa;
    padding: 8px 14px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .points-caption {
    font-size: 11px;
    color: #999;
    text-align: center;
    margin: -16px 0 16px;
    line-height: 1.4;
    letter-spacing: 0.2px;
  }
  .settings-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    color: #764ba2;
    transition: opacity 0.2s;
  }
  .settings-btn:hover { opacity: 0.7; }
  .settings-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
  }
  .settings-overlay.hidden { display: none; }
  .settings-card {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    max-height: 80vh;
    overflow-y: auto;
  }
  .settings-header {
    font-size: 22px;
    font-weight: 700;
    color: #764ba2;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .settings-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #999;
  }
  .settings-section {
    margin-bottom: 28px;
  }
  .settings-section-title {
    font-size: 14px;
    font-weight: 700;
    color: #555;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .mode-checkbox {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .mode-checkbox input {
    width: 18px;
    height: 18px;
    cursor: pointer;
    margin-right: 10px;
  }
  .mode-checkbox label {
    cursor: pointer;
    font-size: 14px;
    color: #555;
  }
  .settings-actions {
    display: flex;
    gap: 8px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #eee;
  }
  .settings-actions button {
    flex: 1;
    padding: 12px 16px;
    border-radius: 8px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
  }
  .settings-save {
    background: #764ba2;
    color: #fff;
  }
  .settings-save:hover { background: #6a3f95; }
  .settings-cancel {
    background: #f1edf6;
    color: #764ba2;
  }
  .settings-cancel:hover { background: #e8e1f0; }
  .progress {
    margin-bottom: 14px;
  }
  .progress-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .progress-bar {
    display: flex;
    gap: 4px;
    justify-content: center;
  }
  .progress-cell {
    flex: 1;
    max-width: 32px;
    height: 16px;
    background: #ece8f3;
    border-radius: 4px;
    transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
  }
  .progress-cell.filled {
    background: linear-gradient(135deg, #8a5cd6, #5d3a82);
    box-shadow: 0 2px 6px rgba(118, 75, 162, 0.35);
    transform: scaleY(1.15);
  }
  body.dog .progress-cell.filled {
    background: linear-gradient(135deg, #ff9a3d, #e64a19);
    box-shadow: 0 2px 6px rgba(230, 74, 25, 0.4);
  }
  body.cheetah .progress-cell.filled {
    background: linear-gradient(135deg, #ff4d4d, #b71c1c);
    box-shadow: 0 2px 8px rgba(183, 28, 28, 0.5);
  }
  .mode-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #fff;
  }
  .mode-label.snail   { background: #764ba2; }
  .mode-label.dog     { background: linear-gradient(90deg, #ff9a3d, #ff4d4d); }
  .mode-label.cheetah { background: linear-gradient(90deg, #ff4d4d, #b71c1c); }
  .timer {
    height: 8px;
    background: #f1edf6;
    border-radius: 4px;
    margin: 0 0 16px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .timer.active { opacity: 1; }
  .timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #4caf50, #ff9a3d 60%, #e64a19);
    border-radius: 4px;
    transform-origin: left center;
  }
  .problem {
    font-size: 64px;
    font-weight: 700;
    color: #333;
    margin: 20px 0;
    letter-spacing: 2px;
  }
  .character {
    margin: 8px auto 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .character svg,
  .character img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    background: #f5f3fa;
    border: 4px solid #fff;
    box-shadow: 0 6px 14px rgba(0,0,0,0.2);
    animation: pop 0.4s ease-out;
  }
  .character-name {
    font-size: 14px;
    font-weight: 600;
    color: #764ba2;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  @keyframes pop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* Login overlay */
  .login-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    padding: 20px;
  }
  .login-overlay.hidden { display: none; }
  .login-card {
    background: #fff;
    border-radius: 20px;
    padding: 36px 32px;
    text-align: center;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
  }
  .login-emoji { font-size: 48px; margin-bottom: 4px; line-height: 1; }
  .login-card h2 { margin: 8px 0 6px; color: #333; font-size: 24px; }
  .login-card p { margin: 0 0 18px; color: #888; font-size: 14px; }
  .login-card input {
    font-size: 28px;
    padding: 12px 16px;
    width: 180px;
    text-align: center;
    border: 2px solid #ccc;
    border-radius: 10px;
    outline: none;
    letter-spacing: 12px;
    font-weight: 700;
    transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: #764ba2; }
  .login-card button {
    display: block;
    margin: 20px auto 0;
    font-size: 18px;
    font-weight: 700;
    padding: 12px 32px;
    background: #764ba2;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .login-card button:hover { background: #5d3a82; }
  .login-card button:active { transform: scale(0.97); }
  .login-error {
    margin-top: 12px;
    color: #c0392b;
    font-size: 13px;
    min-height: 18px;
    font-weight: 600;
  }

  /* Confetti / fireworks overlay */
  .confetti-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    overflow: hidden;
    z-index: 9999;
  }
  .confetti-piece {
    position: fixed;
    will-change: transform, opacity;
    animation: confetti-fall var(--dur, 1.4s) cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translate(0, 0) rotate(0deg);                                   opacity: 1; }
    70%  {                                                                            opacity: 1; }
    100% { transform: translate(var(--dx, 0px), var(--dy, 300px)) rotate(var(--rot, 720deg)); opacity: 0; }
  }
  input[type="number"] {
    font-size: 32px;
    padding: 12px 16px;
    width: 160px;
    text-align: center;
    border: 2px solid #ccc;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]:focus {
    border-color: #764ba2;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  button {
    display: block;
    margin: 20px auto 0;
    font-size: 18px;
    font-weight: 600;
    padding: 12px 32px;
    background: #764ba2;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #5d3a82; }
  button:active { transform: scale(0.97); }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .feedback {
    margin-top: 20px;
    min-height: 28px;
    font-size: 18px;
    font-weight: 600;
  }
  .feedback.right { color: #2e8b57; }
  .feedback.wrong { color: #c0392b; }
  .praise {
    margin-top: 8px;
    min-height: 24px;
    font-size: 20px;
    font-weight: 700;
    color: #764ba2;
  }
  .attempts {
    font-size: 13px;
    color: #888;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="op-toggle" id="op-toggle">
      <button type="button" class="op-btn active" data-op="multiplication">× Multiplication</button>
      <button type="button" class="op-btn" data-op="division">÷ Division</button>
    </div>
    <div class="picker-group" id="table-picker" aria-label="Pick a table">
      <button type="button" class="picker-btn" data-table="2">2</button>
      <button type="button" class="picker-btn" data-table="3">3</button>
      <button type="button" class="picker-btn" data-table="4">4</button>
      <button type="button" class="picker-btn" data-table="5">5</button>
      <button type="button" class="picker-btn" data-table="6">6</button>
      <button type="button" class="picker-btn" data-table="7">7</button>
      <button type="button" class="picker-btn" data-table="8">8</button>
      <button type="button" class="picker-btn" data-table="9">9</button>
      <button type="button" class="picker-btn" data-table="10">10</button>
    </div>
    <div class="picker-group" id="mode-picker" aria-label="Pick a pace">
      <button type="button" class="picker-btn snail"   data-mode="snail">🐌 Snail</button>
      <button type="button" class="picker-btn dog"     data-mode="dog">🐕 Dog (15s)</button>
      <button type="button" class="picker-btn cheetah" data-mode="cheetah">🐆 Cheetah (7s)</button>
    </div>
    <div class="header">
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="settings-btn" id="settings-btn" title="Settings">⚙️</button>
        <h1 id="title">Multiplication Practice</h1>
      </div>
      <div class="points">🎮 <span id="points">0</span> / 1000</div>
    </div>
    <div class="points-caption">
      Cheetah Mode only · 10 🎮 per correct · 100 per table · Table 1 is free · <b>1,000 = all 10 tables mastered</b>
    </div>
    <div class="progress">
      <div class="progress-label">
        Table <span id="table-num">2</span> ·
        <span id="mode-label" class="mode-label classic">Classic Mode</span>
      </div>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
        <div class="progress-cell"></div>
      </div>
    </div>
    <div class="character" id="character"></div>
    <div class="problem" id="problem">— × —</div>
    <div class="timer" id="timer"><div class="timer-bar" id="timer-bar"></div></div>
    <input type="number" id="answer" autocomplete="off" />
    <div class="attempts" id="attempts"></div>
    <button id="submit">Submit</button>
    <div class="feedback" id="feedback"></div>
    <div class="praise" id="praise"></div>
  </div>
  <div id="confetti-layer" class="confetti-layer"></div>

  <div class="login-overlay hidden" id="login-overlay" role="dialog" aria-modal="true">
    <div class="login-card">
      <div class="login-emoji">🎮</div>
      <h2 id="login-greeting">Hi Drohn!</h2>
      <p>Type your secret code to start.</p>
      <input
        type="password"
        inputmode="numeric"
        pattern="[0-9]*"
        id="login-pin"
        maxlength="6"
        placeholder="••••"
        autocomplete="off"
      />
      <button type="button" id="login-btn">Let's Play!</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="settings-overlay hidden" id="settings-overlay">
    <div class="settings-card">
      <div class="settings-header">
        Settings
        <button class="settings-close" id="settings-close">✕</button>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Multiplication Modes</div>
        <div class="mode-checkbox">
          <input type="checkbox" id="mult-snail" checked>
          <label for="mult-snail">🐌 Snail (No timer)</label>
        </div>
        <div class="mode-checkbox">
          <input type="checkbox" id="mult-dog" checked>
          <label for="mult-dog">🐕 Dog (15 seconds)</label>
        </div>
        <div class="mode-checkbox">
          <input type="checkbox" id="mult-cheetah" checked>
          <label for="mult-cheetah">🐆 Cheetah (7 seconds)</label>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Division Modes</div>
        <div class="mode-checkbox">
          <input type="checkbox" id="div-snail" checked>
          <label for="div-snail">🐌 Snail (No timer)</label>
        </div>
        <div class="mode-checkbox">
          <input type="checkbox" id="div-dog" checked>
          <label for="div-dog">🐕 Dog (15 seconds)</label>
        </div>
        <div class="mode-checkbox">
          <input type="checkbox" id="div-cheetah" checked>
          <label for="div-cheetah">🐆 Cheetah (7 seconds)</label>
        </div>
      </div>

      <div class="settings-actions">
        <button type="button" class="settings-cancel" id="settings-cancel">Cancel</button>
        <button type="button" class="settings-save" id="settings-save">Save</button>
      </div>
    </div>
  </div>

<script>
(function () {
  const problemEl   = document.getElementById('problem');
  const answerEl    = document.getElementById('answer');
  const submitBtn   = document.getElementById('submit');
  const feedbackEl  = document.getElementById('feedback');
  const praiseEl    = document.getElementById('praise');
  const pointsEl    = document.getElementById('points');
  const progressBarEl = document.getElementById('progress-bar');
  const attemptsEl  = document.getElementById('attempts');
  const characterEl   = document.getElementById('character');
  const tableNumEl    = document.getElementById('table-num');
  const modeLabelEl   = document.getElementById('mode-label');
  const timerEl       = document.getElementById('timer');
  const timerBarEl    = document.getElementById('timer-bar');

  const MODE_SECONDS = { snail: 0, dog: 15, cheetah: 7 };
  const MODE_ORDER = ['snail', 'dog', 'cheetah'];
  const MODE_LABEL = {
    snail:   'Snail Mode 🐌',
    dog:     'Dog Mode 🐕 (15s)',
    cheetah: 'Cheetah Mode 🐆 (7s)'
  };
  const MODE_SPOKEN = {
    snail:   'snail mode',
    dog:     'dog mode',
    cheetah: 'cheetah mode'
  };
  // Migration map from old mode names so existing saved progress doesn't get wiped
  const MODE_MIGRATE = { classic: 'snail', sonic: 'dog', supersonic: 'cheetah' };

  // Enabled-modes settings storage (declared up here because getEnabledModes
  // is called during boot, long before the Settings UI section below).
  const MODES_STORAGE_KEY = 'mp_modes_settings';
  const defaultModes = { multiplication: ['snail', 'dog', 'cheetah'], division: ['snail', 'dog', 'cheetah'] };

  // Modes enabled in Settings for the CURRENT operation, in progression order.
  // ALL game logic that picks a mode must go through these helpers — the kid
  // must never be placed in a mode that Settings has turned off.
  function enabledModeOrder() {
    const em = getEnabledModes();
    const opModes = (operation === 'division' ? em.division : em.multiplication) || [];
    const order = MODE_ORDER.filter(function (m) { return opModes.indexOf(m) !== -1; });
    return order.length ? order : MODE_ORDER.slice();
  }
  function firstEnabledMode() { return enabledModeOrder()[0]; }
  // Next enabled mode after `mode` in the progression, or null if `mode` is the last enabled one.
  function nextEnabledMode(mode) {
    const order = enabledModeOrder();
    for (let i = 0; i < order.length; i++) {
      if (MODE_ORDER.indexOf(order[i]) > MODE_ORDER.indexOf(mode)) return order[i];
    }
    return null;
  }
  // Saved/remembered modes may reference a mode that was later disabled — clamp.
  function clampToEnabled(mode) {
    return enabledModeOrder().indexOf(mode) !== -1 ? mode : firstEnabledMode();
  }

  const opToggleEl    = document.getElementById('op-toggle');
  const titleEl       = document.getElementById('title');
  const tablePickerEl = document.getElementById('table-picker');
  const modePickerEl  = document.getElementById('mode-picker');

  let a = 0, b = 0;
  let correctAnswer = 0;
  let points = 0;
  let currentTable = 2;            // starts at the 2 table
  let currentMode = 'snail';       // 'snail' | 'dog' | 'cheetah'
  let tableStreak = 0;             // consecutive correct within the current stage
  let praiseShownAt = new Set();   // milestones already praised within the current stage streak
  let charIndex = 0;
  let bag = [];                    // shuffled queue of factors for current table
  let timerId = null;              // active sonic timer (setTimeout handle)
  let timerStartMs = 0;            // absolute wall-clock time when the CURRENT chance started
  let timerDurationMs = 0;         // duration for this chance (MODE_SECONDS * 1000)
  let pendingTimerStartMs = null;  // when restoring a sticky problem, wall-clock start of the paused chance
  let cheetahFailures = 0;         // failed cheetah questions (2 chances used) this attempt
  let inSecondChance = false;      // per-question: true when on the cheetah second attempt
  let cheetahRunEarned = 0;        // uncommitted Robucks awarded in the current cheetah run
                                   // (rolled back on any exit before 10/10 completion — closes several exploits)
  let operation = 'multiplication';// 'multiplication' | 'division'
  let tablePoints = {};            // { tableNum: pointsEarnedOnThatTable } — for demotion refund

  // ----- Persistence (localStorage) -----
  const STORAGE_KEY = 'mp.v3';

  function defaultOpState() {
    return {
      points: 0,
      currentTable: 2,
      currentMode: 'snail',
      tableStreak: 0,
      cheetahFailures: 0,
      praiseShownAt: [],
      tablePoints: {},        // { tableNumber: pointsEarnedOnThatTable }
      bag: [],                // upcoming factors queue (persisted so switch-tab doesn't reshuffle)
      currentProblem: null,   // { a, b, correctAnswer, inSecondChance } — sticky across tab switches
      inSecondChance: false,
      cheetahRunEarned: 0,    // uncommitted cheetah-run Robucks (only committed on 10/10 completion)
      frozenModeStates: {},   // { [table]: { [mode]: { streak, bag, problem+timer, ... } } }
      lastModePerTable: {}    // { [table]: 'snail'|'dog'|'cheetah' } — sticky mode per table
    };
  }

  // Combined storage holds state for BOTH operations + the currently active one
  const combined = {
    op: 'multiplication',
    multiplication: defaultOpState(),
    division: defaultOpState()
  };

  function sanitizeGameState(s) {
    const out = defaultOpState();
    if (!s || typeof s !== 'object') return out;
    if (typeof s.points === 'number') out.points = s.points;
    if (typeof s.currentTable === 'number' && s.currentTable >= 2 && s.currentTable <= 10) {
      out.currentTable = s.currentTable;
    }
    const migratedMode = MODE_MIGRATE[s.currentMode] || s.currentMode;
    if (MODE_ORDER.indexOf(migratedMode) !== -1) out.currentMode = migratedMode;
    if (typeof s.tableStreak === 'number') out.tableStreak = s.tableStreak;
    if (typeof s.cheetahFailures === 'number') out.cheetahFailures = s.cheetahFailures;
    if (Array.isArray(s.praiseShownAt)) out.praiseShownAt = s.praiseShownAt;
    if (s.tablePoints && typeof s.tablePoints === 'object') {
      const tp = {};
      for (const k in s.tablePoints) {
        if (typeof s.tablePoints[k] === 'number') tp[k] = s.tablePoints[k];
      }
      out.tablePoints = tp;
    }
    if (Array.isArray(s.bag)) {
      out.bag = s.bag.filter(function (x) { return typeof x === 'number' && x >= 1 && x <= 10; });
    }
    if (s.currentProblem && typeof s.currentProblem === 'object') {
      const p = s.currentProblem;
      if (typeof p.a === 'number' && typeof p.b === 'number' && typeof p.correctAnswer === 'number') {
        out.currentProblem = { a: p.a, b: p.b, correctAnswer: p.correctAnswer, inSecondChance: !!p.inSecondChance };
        if (typeof p.timerStartMs === 'number' && p.timerStartMs > 0) {
          out.currentProblem.timerStartMs = p.timerStartMs;
        }
        if (typeof p.timerDurationMs === 'number' && p.timerDurationMs > 0) {
          out.currentProblem.timerDurationMs = p.timerDurationMs;
        }
      }
    }
    if (s.frozenModeStates && typeof s.frozenModeStates === 'object') {
      out.frozenModeStates = s.frozenModeStates;
    } else if (s.frozenCheetahRuns && typeof s.frozenCheetahRuns === 'object') {
      // Migrate old shape { [table]: cheetahRunObj } → { [table]: { cheetah: cheetahRunObj } }
      const migrated = {};
      for (const t in s.frozenCheetahRuns) {
        migrated[t] = { cheetah: s.frozenCheetahRuns[t] };
      }
      out.frozenModeStates = migrated;
    }
    if (s.lastModePerTable && typeof s.lastModePerTable === 'object') {
      const lm = {};
      for (const k in s.lastModePerTable) {
        if (MODE_ORDER.indexOf(s.lastModePerTable[k]) !== -1) lm[k] = s.lastModePerTable[k];
      }
      out.lastModePerTable = lm;
    }
    if (typeof s.inSecondChance === 'boolean') out.inSecondChance = s.inSecondChance;
    if (typeof s.cheetahRunEarned === 'number' && s.cheetahRunEarned >= 0) {
      out.cheetahRunEarned = s.cheetahRunEarned;
    }
    return out;
  }

  function captureLive() {
    // Snapshot the WALL-CLOCK start of the current chance so tab-switching
    // can't reset or pause the timer. When restored, elapsed is computed
    // against the original start time.
    const cp = (a > 0 && b > 0)
      ? { a: a, b: b, correctAnswer: correctAnswer, inSecondChance: inSecondChance }
      : null;
    if (cp && timerStartMs > 0 && timerDurationMs > 0 && MODE_SECONDS[currentMode] > 0) {
      cp.timerStartMs = timerStartMs;
      cp.timerDurationMs = timerDurationMs;
    }
    return {
      points: points,
      currentTable: currentTable,
      currentMode: currentMode,
      tableStreak: tableStreak,
      cheetahFailures: cheetahFailures,
      praiseShownAt: Array.from(praiseShownAt),
      tablePoints: tablePoints,
      bag: bag.slice(),
      currentProblem: cp,
      inSecondChance: inSecondChance,
      cheetahRunEarned: cheetahRunEarned,
      frozenModeStates: (combined[operation] && combined[operation].frozenModeStates)
        ? combined[operation].frozenModeStates
        : {},
      lastModePerTable: (combined[operation] && combined[operation].lastModePerTable)
        ? combined[operation].lastModePerTable
        : {}
    };
  }

  function applyLive(s) {
    points          = s.points;
    currentTable    = s.currentTable;
    currentMode     = s.currentMode;
    tableStreak     = s.tableStreak;
    cheetahFailures = s.cheetahFailures;
    praiseShownAt   = new Set(s.praiseShownAt || []);
    tablePoints     = (s.tablePoints && typeof s.tablePoints === 'object') ? Object.assign({}, s.tablePoints) : {};
    bag             = Array.isArray(s.bag) ? s.bag.slice() : [];
    // Table 1 freebie: 100 Robucks credited automatically (the kid never sees
    // a Table 1 question because the game starts at Table 2). Idempotent.
    if (!tablePoints[1]) {
      tablePoints[1] = 100;
      points += 100;
    }
    if (s.currentProblem) {
      a = s.currentProblem.a;
      b = s.currentProblem.b;
      correctAnswer = s.currentProblem.correctAnswer;
      inSecondChance = !!s.currentProblem.inSecondChance;
      pendingTimerStartMs = (typeof s.currentProblem.timerStartMs === 'number' && s.currentProblem.timerStartMs > 0)
        ? s.currentProblem.timerStartMs
        : null;
    } else {
      a = 0; b = 0; correctAnswer = 0;
      inSecondChance = !!s.inSecondChance;
      pendingTimerStartMs = null;
    }
    cheetahRunEarned = (typeof s.cheetahRunEarned === 'number') ? s.cheetahRunEarned : 0;
    // Per-op maps live on the op state object itself so freeze/restore/lookup
    // hits the correct instance.
    if (combined[operation]) {
      combined[operation].frozenModeStates = (s.frozenModeStates && typeof s.frozenModeStates === 'object')
        ? s.frozenModeStates
        : {};
      combined[operation].lastModePerTable = (s.lastModePerTable && typeof s.lastModePerTable === 'object')
        ? s.lastModePerTable
        : {};
    }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') {
          if (parsed.op === 'multiplication' || parsed.op === 'division') {
            combined.op = parsed.op;
          }
          if (parsed.multiplication) combined.multiplication = sanitizeGameState(parsed.multiplication);
          if (parsed.division)       combined.division       = sanitizeGameState(parsed.division);
        }
      } else {
        // First time on v3 — migrate from older single-game v2 key if present
        const oldRaw = localStorage.getItem('multiplicationPractice.v2');
        if (oldRaw) {
          try { combined.multiplication = sanitizeGameState(JSON.parse(oldRaw)); } catch (e) {}
        }
      }
    } catch (e) { /* ignore corrupt state */ }
    // Clean up obsolete keys
    try { localStorage.removeItem('multiplicationPractice.v1'); } catch (e) {}
    try { localStorage.removeItem('multiplicationPractice.v2'); } catch (e) {}
  }

  function saveState() {
    combined[operation] = captureLive();
    combined.op = operation;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(combined));
    } catch (e) { /* ignore quota / disabled storage */ }
  }

  // Returning-visitor check via cookie. Any browser that has visited before
  // and has no saved progress starts at Table 4 Snail Mode instead of Table 2.
  const VISITED_COOKIE = 'mp_visited';
  const wasReturningVisitor = document.cookie
    .split('; ').some(c => c.indexOf(VISITED_COOKIE + '=') === 0);
  try {
    document.cookie = VISITED_COOKIE + '=1; max-age=31536000; path=/; SameSite=Lax';
  } catch (e) { /* ignore */ }
  const hadAnyState = !!(localStorage.getItem(STORAGE_KEY) || localStorage.getItem('multiplicationPractice.v2'));

  loadState();

  // Returning visitor with no saved progress on either op → bump default to Table 4
  if (wasReturningVisitor && !hadAnyState) {
    combined.multiplication.currentTable = 4;
    combined.division.currentTable = 4;
  }

  // BEFORE ANYTHING ELSE: Set up login and show PIN overlay
  // This ensures the game is not playable until PIN is entered
  let userPin = '';

  function showLoginOverlay() {
    const overlay = document.getElementById('login-overlay');
    if (overlay) overlay.classList.remove('hidden');
    const pinInput = document.getElementById('login-pin');
    if (pinInput) {
      pinInput.value = '';
      setTimeout(() => { try { pinInput.focus(); } catch (e) {} }, 60);
    }
  }

  // Show login immediately when page loads
  showLoginOverlay();

  // Now load and prepare game state (but don't show it yet)
  operation = combined.op;
  applyLive(combined[operation]);

  // Daily reset at 11:59 PM PT (6:59 AM UTC next day)
  // Check if we've crossed into a new day and reset points to 100 if so.
  const DAILY_RESET_KEY = 'mp_daily_reset_pt';
  function getPTDate() {
    const now = new Date();
    const ptTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
    return ptTime.toDateString(); // e.g., "Fri Jul 04 2026"
  }
  function checkAndApplyDailyReset() {
    const today = getPTDate();
    let lastResetDate = '';
    try { lastResetDate = localStorage.getItem(DAILY_RESET_KEY) || ''; } catch (e) {}

    if (lastResetDate !== today) {
      // New day in PT timezone — reset points back to 100 and tablePoints to empty
      points = 100;
      tablePoints = {};
      pointsEl.textContent = points;
      currentTable = 2; // Always start at Table 2 after reset
      currentMode = firstEnabledMode(); // First mode enabled in Settings
      try { localStorage.setItem(DAILY_RESET_KEY, today); } catch (e) {}
      // Post event for daily reset
      if (typeof postEvent === 'function') postEvent({ type: 'daily-reset', points: points });
    }
  }
  checkAndApplyDailyReset();

  // Settings may have changed since the state was saved — never resume into a disabled mode.
  currentMode = clampToEnabled(currentMode);

  // Check for daily reset every minute (so resets happen within ~1 min if kid is playing past midnight)
  setInterval(checkAndApplyDailyReset, 60000);
